name: ✨ Feature request
description: Suggest an idea or enhancement
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who is it for?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature and how it should behave.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend / API
        - Frontend
        - ML / training
        - Docker / deployment
        - Docs
        - Other
    validations:
      required: true
