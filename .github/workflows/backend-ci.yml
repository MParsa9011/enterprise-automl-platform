name: Backend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check app tests
      - name: Ruff (format)
        run: ruff format --check alembic
      - name: Black
        run: black --check app tests
      - name: mypy
        run: mypy app

  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev,ml]"
      - name: pytest
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  migrations:
    name: Migrations apply on Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: automl
          POSTGRES_PASSWORD: automl
          POSTGRES_DB: automl
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U automl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: automl
      POSTGRES_PASSWORD: automl
      POSTGRES_DB: automl
      SECRET_KEY: ci-secret-key
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Apply migrations
        run: alembic upgrade head
