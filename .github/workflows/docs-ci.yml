name: Docs CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["docs/**", "mkdocs.yml", ".github/workflows/docs-ci.yml"]
  pull_request:
    paths: ["docs/**", "mkdocs.yml", ".github/workflows/docs-ci.yml"]

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r docs/requirements.txt
      - name: Build (strict)
        run: mkdocs build --strict
